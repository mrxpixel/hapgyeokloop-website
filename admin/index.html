<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --font-sans: 'Geist', 'Pretendard', -apple-system, system-ui, sans-serif;
    --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', monospace;
    /* dark (default) */
    --bg: #0a0a0c;
    --surface: #121215;
    --surface-2: #18181d;
    --surface-3: #1f1f26;
    --border: #26262e;
    --border-strong: #353541;
    --fg: #ededf0;
    --fg-muted: #a0a0ab;
    --fg-subtle: #6c6c78;
    --fg-faint: #4a4a55;
    --accent: #6366f1;
    --accent-hi: #818cf8;
    --accent-soft: rgba(99,102,241,.14);
    --accent-border: rgba(99,102,241,.32);
    --success: #10b981;
    --success-soft: rgba(16,185,129,.14);
    --warning: #f59e0b;
    --warning-soft: rgba(245,158,11,.14);
    --danger: #ef4444;
    --danger-soft: rgba(239,68,68,.14);
    --violet: #a855f7;
    --violet-soft: rgba(168,85,247,.14);
    --cyan: #06b6d4;
    --cyan-soft: rgba(6,182,212,.14);
    --pink: #ec4899;
    --pink-soft: rgba(236,72,153,.14);
    --r-sm: 6px; --r: 10px; --r-lg: 14px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.25);
    --shadow: 0 8px 24px rgba(0,0,0,.35);
    --shadow-lg: 0 20px 60px rgba(0,0,0,.55);
  }
  [data-theme="light"] {
    --bg: #fafafa;
    --surface: #ffffff;
    --surface-2: #f5f5f7;
    --surface-3: #ededf0;
    --border: #e4e4e9;
    --border-strong: #d4d4da;
    --fg: #0a0a0c;
    --fg-muted: #52525b;
    --fg-subtle: #71717a;
    --fg-faint: #a1a1aa;
    --accent: #4f46e5;
    --accent-hi: #6366f1;
    --accent-soft: rgba(79,70,229,.08);
    --accent-border: rgba(79,70,229,.2);
    --success-soft: rgba(16,185,129,.1);
    --warning-soft: rgba(245,158,11,.12);
    --danger-soft: rgba(239,68,68,.08);
    --violet-soft: rgba(168,85,247,.1);
    --cyan-soft: rgba(6,182,212,.1);
    --pink-soft: rgba(236,72,153,.1);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
    --shadow: 0 6px 20px rgba(0,0,0,.06);
    --shadow-lg: 0 20px 60px rgba(0,0,0,.1);
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  html, body { background: var(--bg); color: var(--fg); font-family: var(--font-sans); font-size: 13.5px; line-height: 1.55; min-height: 100vh; -webkit-font-smoothing: antialiased; transition: background .2s, color .2s; }
  @keyframes spin { to { transform: rotate(360deg); } }
  a { color: var(--accent); text-decoration: none; cursor: pointer; }
  button { font: inherit; color: inherit; cursor: pointer; background: none; border: 0; }
  input, textarea, select { font: inherit; color: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

  .app { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }

  /* sidebar */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0; overflow: hidden; }
  .sb-brand { padding: 18px 18px 14px; border-bottom: 1px solid var(--border); }
  .brand-row { display: flex; align-items: center; gap: 10px; }
  .brand-mark { width: 28px; height: 28px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--violet)); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 13px; box-shadow: 0 2px 8px rgba(99,102,241,.4); }
  .brand-text { font-weight: 700; font-size: 14px; letter-spacing: -.01em; }
  .brand-env { font-family: var(--font-mono); font-size: 9.5px; font-weight: 500; color: var(--fg-subtle); letter-spacing: .08em; text-transform: uppercase; margin-top: 2px; }

  .sb-subject { margin-top: 12px; padding: 9px 11px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r-sm); font-size: 12px; color: var(--fg-muted); display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: all .15s; }
  .sb-subject:hover { background: var(--surface-3); color: var(--fg); }
  .sb-subject .sb-subject-name { font-weight: 500; color: var(--fg); font-family: var(--font-mono); font-size: 11.5px; }
  .sb-subject .chev { color: var(--fg-faint); font-size: 10px; }

  .sb-search { margin: 12px 14px 4px; padding: 7px 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r-sm); display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--fg-subtle); cursor: pointer; transition: all .15s; }
  .sb-search:hover { background: var(--surface-3); border-color: var(--border-strong); }
  .sb-search .kbd { margin-left: auto; font-family: var(--font-mono); font-size: 10px; padding: 1px 5px; background: var(--surface-3); border: 1px solid var(--border); border-radius: 4px; color: var(--fg-muted); }

  .sb-nav { flex: 1; padding: 10px 10px; overflow-y: auto; }
  .sb-group { margin-top: 12px; }
  .sb-group-title { font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--fg-faint); padding: 6px 11px; }
  .sb-item { display: flex; align-items: center; gap: 10px; padding: 7px 11px; border-radius: 7px; font-size: 13px; font-weight: 500; color: var(--fg-muted); cursor: pointer; transition: all .12s; user-select: none; margin-bottom: 1px; }
  .sb-item:hover { background: var(--surface-2); color: var(--fg); }
  .sb-item.active { background: var(--surface-2); color: var(--fg); box-shadow: inset 2px 0 0 var(--accent); }
  .sb-item .sb-ic { width: 16px; height: 16px; flex-shrink: 0; color: var(--fg-faint); }
  .sb-item.active .sb-ic, .sb-item:hover .sb-ic { color: var(--accent); }
  .sb-item .tag { margin-left: auto; font-family: var(--font-mono); font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 10px; background: var(--warning-soft); color: var(--warning); }
  .sb-item .tag.info { background: var(--accent-soft); color: var(--accent); }

  .sb-foot { padding: 12px 14px; border-top: 1px solid var(--border); }
  .realtime { display: flex; align-items: center; gap: 7px; font-size: 11px; font-family: var(--font-mono); color: var(--fg-subtle); margin-bottom: 10px; }
  .realtime .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 0 0 rgba(16,185,129,.6); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(16,185,129,.55); } 50% { box-shadow: 0 0 0 6px rgba(16,185,129,0); } }
  .sb-user { display: flex; align-items: center; gap: 10px; }
  .sb-user .avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--violet), var(--pink)); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; font-size: 12px; }
  .sb-user .meta { flex: 1; min-width: 0; }
  .sb-user .name { font-size: 12.5px; font-weight: 500; }
  .sb-user .email { font-size: 10.5px; color: var(--fg-subtle); font-family: var(--font-mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sb-user button { padding: 5px; color: var(--fg-subtle); border-radius: 5px; }
  .sb-user button:hover { color: var(--danger); background: var(--danger-soft); }

  /* main */
  main { padding: 0; min-width: 0; }
  .topbar { padding: 14px 28px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 30; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .topbar h1 { font-size: 18px; font-weight: 600; letter-spacing: -.015em; }
  .topbar .sub { font-size: 12px; color: var(--fg-subtle); margin-top: 2px; font-family: var(--font-mono); }
  .top-actions { display: flex; align-items: center; gap: 8px; }
  .icon-btn { width: 34px; height: 34px; border-radius: 8px; color: var(--fg-muted); display: flex; align-items: center; justify-content: center; transition: all .15s; position: relative; }
  .icon-btn:hover { background: var(--surface-2); color: var(--fg); }
  .icon-btn .dot { position: absolute; top: 7px; right: 8px; width: 7px; height: 7px; border-radius: 50%; background: var(--danger); border: 2px solid var(--bg); }
  .content { padding: 24px 28px 80px; max-width: 1280px; }

  /* buttons */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 7px 13px; border: 1px solid var(--border); border-radius: 7px; font-size: 12.5px; font-weight: 500; cursor: pointer; transition: all .15s; white-space: nowrap; background: var(--surface); color: var(--fg); }
  .btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { filter: brightness(1.08); background: var(--accent); border-color: var(--accent); }
  .btn-success { background: var(--success); color: #052e21; border-color: var(--success); }
  .btn-success:hover { filter: brightness(1.08); background: var(--success); }
  .btn-danger { color: var(--danger); border-color: var(--danger-soft); }
  .btn-danger:hover { background: var(--danger-soft); border-color: var(--danger); }
  .btn-sm { padding: 4px 9px; font-size: 11.5px; border-radius: 6px; }
  .btn-xs { padding: 2px 7px; font-size: 10.5px; border-radius: 5px; font-family: var(--font-mono); }

  /* KPI */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 18px; transition: all .15s; position: relative; overflow: hidden; }
  .kpi:hover { border-color: var(--border-strong); }
  .kpi-label { font-family: var(--font-mono); font-size: 10.5px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--fg-subtle); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .kpi-label .ic { width: 13px; height: 13px; color: var(--fg-faint); }
  .kpi-value { font-size: 26px; font-weight: 600; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
  .kpi-delta { font-size: 11px; margin-top: 6px; font-family: var(--font-mono); display: flex; align-items: center; gap: 4px; color: var(--fg-subtle); }
  .kpi-delta .up { color: var(--success); }
  .kpi-delta .down { color: var(--danger); }
  .kpi-spark { position: absolute; bottom: 0; right: 0; width: 90px; height: 38px; opacity: .7; }

  /* panels */
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 16px; }
  .panel-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .panel-title { font-size: 13.5px; font-weight: 600; letter-spacing: -.005em; }
  .panel-sub { font-size: 11px; color: var(--fg-subtle); font-family: var(--font-mono); margin-top: 2px; }
  .panel-body { padding: 16px 18px; }
  .panel-body.flush { padding: 0; }

  /* two-col grid for overview */
  .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 1100px) { .grid-2 { grid-template-columns: 1fr; } }

  /* activity feed */
  .feed { display: flex; flex-direction: column; }
  .feed-item { display: flex; gap: 12px; padding: 12px 18px; border-bottom: 1px solid var(--border); font-size: 12.5px; }
  .feed-item:last-child { border-bottom: 0; }
  .feed-av { width: 26px; height: 26px; border-radius: 50%; background: var(--surface-3); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--fg-muted); flex-shrink: 0; }
  .feed-av.resolved { background: var(--success-soft); color: var(--success); }
  .feed-av.published { background: var(--accent-soft); color: var(--accent); }
  .feed-av.assigned { background: var(--cyan-soft); color: var(--cyan); }
  .feed-av.version { background: var(--warning-soft); color: var(--warning); }
  .feed-av.admin { background: var(--violet-soft); color: var(--violet); }
  .feed-text { flex: 1; min-width: 0; }
  .feed-text strong { color: var(--fg); font-weight: 600; }
  .feed-text .action { color: var(--fg-muted); }
  .feed-text .target { color: var(--accent); }
  .feed-time { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-faint); white-space: nowrap; }

  /* reports */
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-chip { padding: 5px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; font-size: 12px; font-weight: 500; color: var(--fg-muted); cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
  .filter-chip:hover { border-color: var(--border-strong); color: var(--fg); }
  .filter-chip.active { background: var(--accent-soft); border-color: var(--accent-border); color: var(--accent); }
  .filter-chip .ct { font-family: var(--font-mono); font-size: 10px; padding: 1px 6px; background: var(--surface-2); border-radius: 10px; }
  .filter-chip.active .ct { background: rgba(99,102,241,.22); color: var(--accent); }
  .saved-view { padding: 5px 12px; background: var(--surface); border: 1px dashed var(--border-strong); border-radius: 20px; font-size: 11.5px; font-weight: 500; color: var(--fg-muted); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); }
  .saved-view:hover { color: var(--accent); border-color: var(--accent); }
  .saved-view .pin { color: var(--warning); }

  .search-input { flex: 1; min-width: 180px; max-width: 360px; padding: 6px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; font-size: 12.5px; color: var(--fg); outline: none; transition: all .15s; }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .search-input::placeholder { color: var(--fg-faint); }

  .bulk-bar { padding: 10px 14px; background: var(--accent-soft); border: 1px solid var(--accent-border); border-radius: var(--r); margin-bottom: 12px; display: flex; align-items: center; gap: 12px; font-size: 12.5px; }
  .bulk-bar .cnt { font-weight: 600; color: var(--accent); }
  .bulk-bar .spacer { flex: 1; }

  .item-list { display: flex; flex-direction: column; gap: 6px; }
  .item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; transition: border-color .15s; }
  .item:hover { border-color: var(--border-strong); }
  .item.selected { border-color: var(--accent); background: var(--accent-soft); }
  .item-head { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; user-select: none; }
  .item-check { width: 15px; height: 15px; border: 1.5px solid var(--border-strong); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; background: var(--surface); }
  .item-check.checked { background: var(--accent); border-color: var(--accent); color: #fff; }
  .item-check:hover { border-color: var(--accent); }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot.pending { background: var(--warning); box-shadow: 0 0 6px rgba(245,158,11,.5); }
  .dot.in_progress { background: var(--cyan); box-shadow: 0 0 6px rgba(6,182,212,.5); }
  .dot.resolved { background: var(--success); box-shadow: 0 0 6px rgba(16,185,129,.4); }
  .item-meta { flex: 1; min-width: 0; }
  .item-title { font-weight: 500; font-size: 13px; color: var(--fg); margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item-sub { font-size: 11px; color: var(--fg-subtle); font-family: var(--font-mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .item-time { font-size: 11px; color: var(--fg-faint); font-family: var(--font-mono); }
  .badge { display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: .03em; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .badge-success { background: var(--success-soft); color: var(--success); }
  .badge-warning { background: var(--warning-soft); color: var(--warning); }
  .badge-info { background: var(--accent-soft); color: var(--accent); }
  .badge-cyan { background: var(--cyan-soft); color: var(--cyan); }
  .badge-violet { background: var(--violet-soft); color: var(--violet); }
  .badge-neutral { background: var(--surface-2); color: var(--fg-muted); border: 1px solid var(--border); }

  .chev { color: var(--fg-faint); transition: transform .2s; flex-shrink: 0; }
  .item.open .chev { transform: rotate(90deg); }
  .item-body { display: none; border-top: 1px solid var(--border); padding: 18px; background: var(--surface-2); }
  .item.open .item-body { display: block; }
  .det-section { margin-bottom: 16px; }
  .det-section:last-child { margin-bottom: 0; }
  .det-label { font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--fg-faint); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .det-text { font-size: 13px; line-height: 1.65; color: var(--fg); white-space: pre-wrap; }
  .q-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 14px 16px; position: relative; }
  .q-box .q-edit { position: absolute; top: 10px; right: 10px; padding: 3px 8px; font-size: 10.5px; font-family: var(--font-mono); }
  .q-stem { font-size: 13px; font-weight: 500; line-height: 1.65; margin-bottom: 12px; padding-right: 50px; }
  .choices-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .choice-item { font-size: 12px; line-height: 1.55; padding: 7px 11px; border-radius: var(--r-sm); color: var(--fg-muted); background: var(--surface-2); display: flex; gap: 8px; }
  .choice-item.correct { background: var(--success-soft); color: var(--success); font-weight: 500; }
  .choice-item .choice-id { font-family: var(--font-mono); font-weight: 600; }
  .exp-box { margin-top: 12px; padding: 12px 14px; background: var(--accent-soft); border-left: 2px solid var(--accent); border-radius: 0 var(--r-sm) var(--r-sm) 0; font-size: 12px; line-height: 1.7; color: var(--fg-muted); }

  textarea { width: 100%; min-height: 80px; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--fg); font-size: 13px; line-height: 1.55; resize: vertical; outline: none; transition: all .15s; font-family: inherit; }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .form-actions { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; }

  .tracking { display: flex; flex-wrap: wrap; gap: 14px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); font-size: 11px; font-family: var(--font-mono); color: var(--fg-subtle); }
  .tracking .tr-item { display: flex; align-items: center; gap: 5px; }
  .tr-item svg { color: var(--fg-faint); }

  /* cmd-k palette */
  .palette-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: flex-start; justify-content: center; padding-top: 12vh; }
  [data-theme="light"] .palette-backdrop { background: rgba(0,0,0,.3); }
  .palette { width: 100%; max-width: 560px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-lg); overflow: hidden; }
  .palette-input { width: 100%; padding: 16px 18px; background: transparent; border: 0; border-bottom: 1px solid var(--border); outline: none; font-size: 15px; color: var(--fg); }
  .palette-input::placeholder { color: var(--fg-faint); }
  .palette-list { max-height: 380px; overflow-y: auto; padding: 6px; }
  .palette-section { font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--fg-faint); padding: 8px 12px 4px; }
  .palette-item { padding: 8px 12px; border-radius: 7px; display: flex; align-items: center; gap: 10px; font-size: 13px; cursor: pointer; }
  .palette-item.selected { background: var(--accent-soft); color: var(--accent); }
  .palette-item .p-ic { width: 15px; height: 15px; color: var(--fg-muted); flex-shrink: 0; }
  .palette-item.selected .p-ic { color: var(--accent); }
  .palette-item .p-kind { margin-left: auto; font-family: var(--font-mono); font-size: 10px; color: var(--fg-faint); }
  .palette-foot { padding: 8px 14px; border-top: 1px solid var(--border); display: flex; gap: 14px; font-size: 10.5px; color: var(--fg-subtle); font-family: var(--font-mono); }
  .palette-foot .kbd { padding: 1px 5px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 3px; font-size: 9.5px; margin-right: 4px; }

  /* announcements */
  .ann-form { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; padding: 16px 18px; border-bottom: 1px solid var(--border); }
  @media (max-width: 720px) { .ann-form { grid-template-columns: 1fr; } }
  .ann-left { display: flex; flex-direction: column; gap: 8px; }
  .ann-right { display: flex; flex-direction: column; gap: 8px; }
  .field-label { font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 4px; }
  .field-input { padding: 8px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); font-size: 13px; color: var(--fg); outline: none; }
  .field-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .select-pills { display: flex; gap: 4px; }
  .select-pill { flex: 1; padding: 7px 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; color: var(--fg-muted); cursor: pointer; text-align: center; transition: all .15s; }
  .select-pill.active { background: var(--accent-soft); border-color: var(--accent-border); color: var(--accent); }

  /* subjects section */
  .subj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .subj-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 16px; }
  .subj-card .code { font-family: var(--font-mono); font-size: 10.5px; font-weight: 600; color: var(--accent); background: var(--accent-soft); padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 6px; }
  .subj-card .nm { font-size: 13.5px; font-weight: 600; margin-bottom: 8px; }
  .subj-card .ct { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-subtle); display: flex; gap: 12px; }

  /* app version */
  .plat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 14px; }
  .plat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 18px 20px; }
  .plat-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .plat-ic { width: 34px; height: 34px; border-radius: 8px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-weight: 700; font-size: 11px; color: var(--fg-muted); }
  .plat-name { font-size: 14px; font-weight: 600; }
  .plat-updated { font-size: 10.5px; color: var(--fg-faint); font-family: var(--font-mono); margin-top: 2px; }
  .plat-card dl { display: grid; grid-template-columns: 100px 1fr; gap: 7px 12px; font-size: 12px; margin-bottom: 14px; }
  .plat-card dt { color: var(--fg-subtle); font-family: var(--font-mono); font-size: 10.5px; }
  .plat-card dd { color: var(--fg); font-family: var(--font-mono); }
  .force-on { color: var(--danger); font-weight: 600; }

  .toggle { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .toggle-track { width: 32px; height: 18px; border-radius: 20px; background: var(--surface-3); border: 1px solid var(--border); position: relative; transition: all .15s; }
  .toggle-track::after { content: ''; position: absolute; top: 1px; left: 1px; width: 14px; height: 14px; border-radius: 50%; background: var(--fg-muted); transition: all .15s; }
  .toggle.on .toggle-track { background: var(--accent); border-color: var(--accent); }
  .toggle.on .toggle-track::after { left: 15px; background: #fff; }

  /* admins list */
  .user-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 16px; display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
  .user-row:hover { border-color: var(--border-strong); }
  .user-av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; font-size: 12px; flex-shrink: 0; }
  .user-info { flex: 1; min-width: 0; }
  .user-name-line { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
  .user-name { font-size: 13px; font-weight: 500; }
  .user-email { font-size: 11px; color: var(--fg-subtle); font-family: var(--font-mono); }
  .user-stat { font-size: 10.5px; color: var(--fg-faint); font-family: var(--font-mono); margin-top: 3px; display: flex; gap: 10px; }
  .subj-tag { display: inline-flex; align-items: center; gap: 3px; padding: 1px 7px; border-radius: 10px; font-size: 10px; font-family: var(--font-mono); background: var(--accent-soft); color: var(--accent); }

  /* chart */
  .chart-area { position: relative; height: 240px; padding: 8px; }
  .chart-grid line { stroke: var(--border); stroke-dasharray: 2 3; }
  .chart-axis { fill: var(--fg-faint); font-family: var(--font-mono); font-size: 10px; }
  .bars rect { transition: opacity .2s; }

  /* toast */
  .toast-stack { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast { padding: 10px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--shadow-lg); font-size: 12.5px; font-weight: 500; display: flex; align-items: center; gap: 8px; animation: toastIn .25s; }
  .toast.success { color: var(--success); border-color: var(--success-soft); }
  .toast.info { color: var(--accent); border-color: var(--accent-border); }
  @keyframes toastIn { from { transform: translateX(20px); opacity: 0; } }

  /* notif panel */
  .notif-panel { position: absolute; top: calc(100% + 8px); right: 0; width: 360px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-lg); z-index: 50; overflow: hidden; }
  .notif-head { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .notif-head-title { font-size: 13px; font-weight: 600; }
  .notif-list { max-height: 400px; overflow-y: auto; }
  .notif-item { padding: 11px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; cursor: pointer; transition: background .15s; }
  .notif-item:hover { background: var(--surface-2); }
  .notif-item:last-child { border-bottom: 0; }
  .notif-item.unread { background: var(--accent-soft); }
  .notif-item.unread:hover { background: var(--accent-soft); filter: brightness(1.02); }
  .notif-av { width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .notif-text { flex: 1; font-size: 12px; line-height: 1.5; }
  .notif-time { font-family: var(--font-mono); font-size: 10px; color: var(--fg-faint); margin-top: 3px; }

  /* shortcut modal */
  .shortcut-list { padding: 16px 18px; display: grid; grid-template-columns: 1fr; gap: 10px; }
  .shortcut { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .shortcut .keys { display: flex; gap: 4px; }
  .shortcut .keys .k { padding: 2px 7px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 5px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }

  /* sidebar backdrop (mobile only visible, but always fixed to stay out of grid flow) */
  .sb-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 55; opacity: 0; pointer-events: none; transition: opacity .2s; }

  /* mobile */
  .mobile-topbar { display: none; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 40; }
  .mobile-menu { padding: 6px; color: var(--fg-muted); }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: fixed; top: 0; left: 0; width: 280px; z-index: 60; transform: translateX(-100%); transition: transform .22s; box-shadow: var(--shadow-lg); }
    .sidebar.open { transform: translateX(0); }
    .mobile-topbar { display: flex; }
    .topbar { padding: 12px 16px; }
    .content { padding: 16px 16px 80px; }
    .sb-backdrop.visible { opacity: 1; pointer-events: auto; }
  }

  /* proposed schema banner */
  .schema-banner { padding: 12px 16px; background: linear-gradient(90deg, var(--violet-soft), var(--accent-soft)); border: 1px solid var(--accent-border); border-radius: var(--r); margin-bottom: 16px; font-size: 12px; color: var(--fg-muted); display: flex; gap: 10px; align-items: flex-start; }
  .schema-banner .ic { color: var(--violet); flex-shrink: 0; margin-top: 2px; }
  .schema-banner strong { color: var(--fg); }
  .schema-banner .close { margin-left: auto; cursor: pointer; color: var(--fg-subtle); padding: 0 4px; }

  /* design note */
  .note-stack { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
  .new-tag { display: inline-block; font-family: var(--font-mono); font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 4px; background: var(--violet-soft); color: var(--violet); vertical-align: middle; margin-left: 6px; letter-spacing: .04em; }
</style>

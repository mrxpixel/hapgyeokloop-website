<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>합격루프 OG — Loop Hero</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jua&display=swap">
<style>
  html, body { margin: 0; padding: 0; background: #2a2a2a; }
  #stage { width: 1200px; height: 630px; }
  #og {
    width: 1200px; height: 630px;
    background: #ffffff;
    position: relative;
    overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 36px;
    font-family: 'Pretendard Variable', Pretendard, system-ui, sans-serif;
  }
  .loop {
    width: 520px; height: auto;
    display: block;
  }
  .wordmark {
    font-family: 'Jua', 'Pretendard Variable', sans-serif;
    font-size: 124px;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: #0c2a26;
    margin: 0;
    line-height: 1;
  }
  .tagline {
    font-size: 28px;
    font-weight: 500;
    color: #5a6b68;
    margin: 0;
    letter-spacing: -0.015em;
  }
  .tagline b { color: #1f786a; font-weight: 700; }
</style>
</head>
<body>
<div id="stage">
  <div id="og">
    <img class="loop" src="/previews/loop.png" alt="합격루프">
    <h1 class="wordmark">합격루프</h1>
    <p class="tagline">기억 과학 기반 <b>자격증 복습</b></p>
  </div>
</div>
</body>
</html>

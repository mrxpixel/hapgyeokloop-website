<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="합격루프 비밀번호 재설정 페이지">
  <title>합격루프 | 비밀번호 재설정</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <style>
    :root {
      --navy: #040E30;
      --primary: #1840D4;
      --primary-lt: #2B55F0;
      --primary-pale: #EEF2FF;
      --accent: #FF6B2C;
      --accent-hover: #E85A1A;
      --bg: #F5F7FD;
      --surface: #FFFFFF;
      --border: #E2E6F3;
      --text: #050D2E;
      --text-muted: #6B728E;
      --danger: #D92D20;
      --success: #027A48;
      --r-lg: 18px;
      --r-md: 12px;
      --sh-md: 0 8px 32px rgba(4,14,48,0.11);
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --t: 0.22s;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard Variable', 'Noto Sans KR', sans-serif;
      color: var(--text);
      background:
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(24,64,212,0.09) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(255,107,44,0.07) 0%, transparent 65%),
        var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--sh-md);
      padding: 32px 28px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 18px;
      font-weight: 900;
      color: var(--navy);
      letter-spacing: -0.03em;
      margin-bottom: 18px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: var(--primary);
      position: relative;
      flex-shrink: 0;
    }

    .logo-mark::before,
    .logo-mark::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.85);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .logo-mark::before { width: 18px; height: 18px; }
    .logo-mark::after { width: 9px; height: 9px; border-color: var(--accent); }

    h1 {
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--text-muted);
      line-height: 1.65;
      margin-bottom: 24px;
      font-size: 15px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 13px 14px;
      font-size: 15px;
      font-family: inherit;
      transition: border-color var(--t) var(--ease), box-shadow var(--t) var(--ease);
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(24,64,212,0.12);
    }

    .hint {
      margin-top: 4px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 100px;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 16px;
      cursor: pointer;
      transition: transform var(--t) var(--ease), background var(--t) var(--ease), box-shadow var(--t) var(--ease);
      box-shadow: 0 4px 20px rgba(255,107,44,0.35);
      margin-top: 6px;
    }

    .btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(255,107,44,0.4);
    }

    .btn:disabled {
      cursor: not-allowed;
      transform: none;
      opacity: 0.6;
      box-shadow: none;
    }

    .status {
      margin-top: 16px;
      border-radius: var(--r-md);
      padding: 12px 13px;
      font-size: 14px;
      line-height: 1.5;
      display: none;
    }

    .status.error {
      display: block;
      background: #FEF3F2;
      color: var(--danger);
      border: 1px solid #FECACA;
    }

    .status.success {
      display: block;
      background: #ECFDF3;
      color: var(--success);
      border: 1px solid #ABEFC6;
    }

    .footer-link {
      display: inline-block;
      margin-top: 18px;
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color var(--t) var(--ease), color var(--t) var(--ease);
    }

    .footer-link:hover {
      color: var(--primary-lt);
      border-bottom-color: var(--primary-lt);
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo"><span class="logo-mark" aria-hidden="true"></span><span>합격루프</span></div>
    <h1>비밀번호 재설정</h1>
    <p class="subtitle">새 비밀번호를 입력해 계정 보안을 다시 설정하세요.</p>

    <form id="reset-form" novalidate>
      <div class="field">
        <label for="password">새 비밀번호</label>
        <input id="password" type="password" autocomplete="new-password" minlength="8" required>
        <p class="hint">8자 이상 입력해 주세요.</p>
      </div>

      <div class="field">
        <label for="confirm-password">새 비밀번호 확인</label>
        <input id="confirm-password" type="password" autocomplete="new-password" minlength="8" required>
      </div>

      <button id="submit-btn" type="submit" class="btn">비밀번호 변경</button>
    </form>

    <div id="status" class="status" role="status" aria-live="polite"></div>
    <a class="footer-link" href="/">메인 페이지로 이동</a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://xhdnembbkwemroeetnrw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhoZG5lbWJia3dlbXJvZWV0bnJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MjIyNTAsImV4cCI6MjA4ODI5ODI1MH0.dH245k6wOedprkivEF8ObA_c4xB5AqvPEKF6_HJ0bHs';

    const form = document.getElementById('reset-form');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm-password');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submit-btn');

    function readRecoveryParams() {
      const query = new URLSearchParams(window.location.search);
      const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      const accessToken = query.get('access_token') || hash.get('access_token');
      const refreshToken = query.get('refresh_token') || hash.get('refresh_token');
      const type = query.get('type') || hash.get('type');
      return { accessToken, refreshToken, type };
    }

    function showStatus(type, message) {
      statusEl.className = 'status ' + type;
      statusEl.textContent = message;
    }

    function disableForm(disabled) {
      submitBtn.disabled = disabled;
      passwordInput.disabled = disabled;
      confirmInput.disabled = disabled;
    }

    (async function init() {
      const { accessToken, refreshToken, type } = readRecoveryParams();

      if (!accessToken || type !== 'recovery') {
        disableForm(true);
        showStatus('error', '유효하지 않은 비밀번호 재설정 링크입니다. 이메일에서 최신 링크를 다시 열어 주세요.');
        return;
      }

      if (SUPABASE_URL.includes('YOUR_PROJECT_REF') || SUPABASE_ANON_KEY.includes('YOUR_SUPABASE_ANON_KEY')) {
        disableForm(true);
        showStatus('error', '페이지 설정이 완료되지 않았습니다. Supabase URL/키를 입력해 주세요.');
        return;
      }

      window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      if (refreshToken) {
        const { error } = await window.supabaseClient.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken
        });

        if (error) {
          disableForm(true);
          showStatus('error', '세션 확인에 실패했습니다. 재설정 링크를 다시 요청해 주세요.');
        }
      }
    })();

    form.addEventListener('submit', async function (event) {
      event.preventDefault();

      const password = passwordInput.value.trim();
      const confirm = confirmInput.value.trim();

      if (password.length < 8) {
        showStatus('error', '비밀번호는 8자 이상이어야 합니다.');
        return;
      }

      if (password !== confirm) {
        showStatus('error', '비밀번호 확인이 일치하지 않습니다.');
        return;
      }

      if (!window.supabaseClient) {
        showStatus('error', '클라이언트 설정이 완료되지 않았습니다.');
        return;
      }

      disableForm(true);
      showStatus('success', '비밀번호를 변경하는 중입니다...');

      const { error } = await window.supabaseClient.auth.updateUser({ password: password });

      if (error) {
        disableForm(false);
        showStatus('error', '비밀번호 변경에 실패했습니다. 링크가 만료되었을 수 있습니다.');
        return;
      }

      showStatus('success', '비밀번호가 성공적으로 변경되었습니다. 로그인 페이지로 이동해 주세요.');
      form.classList.add('hidden');
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MarkdownEditor Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --font-sans: 'Geist', 'Pretendard', -apple-system, system-ui, sans-serif;
    --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', monospace;
    --bg: #0a0a0c;
    --surface: #121215;
    --surface-2: #18181d;
    --surface-3: #1f1f26;
    --border: #26262e;
    --border-strong: #353541;
    --fg: #ededf0;
    --fg-muted: #a0a0ab;
    --fg-subtle: #6c6c78;
    --fg-faint: #4a4a55;
    --accent: #6366f1;
    --accent-hi: #818cf8;
    --accent-soft: rgba(99,102,241,.14);
    --accent-border: rgba(99,102,241,.32);
    --r-sm: 6px;
    --r: 10px;
    --r-lg: 14px;
    --shadow: 0 8px 24px rgba(0,0,0,.35);
  }

  [data-theme="light"] {
    --bg: #fafafa;
    --surface: #ffffff;
    --surface-2: #f5f5f7;
    --surface-3: #ededf0;
    --border: #e4e4e9;
    --border-strong: #d4d4da;
    --fg: #0a0a0c;
    --fg-muted: #52525b;
    --fg-subtle: #71717a;
    --fg-faint: #a1a1aa;
    --accent: #4f46e5;
    --accent-hi: #6366f1;
    --accent-soft: rgba(79,70,229,.08);
    --accent-border: rgba(79,70,229,.2);
    --shadow: 0 6px 20px rgba(0,0,0,.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100vh; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-sans);
    font-size: 13.5px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  button { font: inherit; color: inherit; cursor: pointer; background: none; border: 0; }
  input, textarea, select { font: inherit; color: inherit; }
  textarea {
    width: 100%;
    min-height: 80px;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    color: var(--fg);
    font-size: 13px;
    line-height: 1.55;
    resize: vertical;
    outline: none;
    transition: all .15s;
    font-family: inherit;
  }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .field-input {
    padding: 8px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    font-size: 13px;
    color: var(--fg);
    outline: none;
  }
  .field-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .btn {
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--fg);
    cursor: pointer;
    display: inline-flex;
    font-size: 12.5px;
    font-weight: 500;
    gap: 6px;
    justify-content: center;
    padding: 7px 13px;
    transition: all .15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent); border-color: var(--accent); filter: brightness(1.08); }
  .btn-xs { border-radius: 5px; font-family: var(--font-mono); font-size: 10.5px; padding: 2px 7px; }
  .demo-shell { margin: 0 auto; max-width: 980px; padding: 28px; }
  .demo-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
  .demo-head h1 { font-size: 20px; font-weight: 600; letter-spacing: -.015em; }
  .demo-head p { color: var(--fg-subtle); font-family: var(--font-mono); font-size: 11px; margin-top: 3px; }
  .demo-grid { display: grid; gap: 14px; }
  .demo-output { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
  .demo-output h2 { border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 600; padding: 12px 14px; }
  .demo-output pre {
    color: var(--fg-muted);
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.7;
    overflow-x: auto;
    padding: 14px;
    white-space: pre-wrap;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="./markdown-demo.jsx"></script>
</body>
</html>
